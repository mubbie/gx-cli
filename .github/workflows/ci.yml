name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.22"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -o gx .

      - name: Vet
        run: go vet ./...

      - name: Verify binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./gx.exe --version
            ./gx.exe --help
          else
            ./gx --version
            ./gx --help
          fi
